<main>

<h1 class="important">Contact Mastiff Card Club</h1>

<form name="contactForm" action="FormProcess.php" method="post">

<!-- FIRST NAME -->
<label for="FirstName">* First Name</label>
<input type="text" name="FirstName" id="FirstName" required>

<!-- LAST NAME -->
<label for="LastName">* Last Name</label>
<input type="text" name="LastName" id="LastName" required>

<!-- CITY -->
<label for="City">City</label>
<input type="text" name="City" id="City">

<!-- STATE -->
<label for="State">State</label>
<select name="State" id="State">
<option value="FL" selected>Florida</option>
<option value="CA">California</option>
<option value="TX">Texas</option>
</select>

<!-- ZIP -->
<label for="Zip">Zip Code</label>
<input type="text" name="Zip" id="Zip" pattern="[0-9]{5}" title="Enter 5 digit zip">

<!-- EMAIL -->
<label for="Email">* Email</label>
<input type="email" name="Email" id="Email" required>

<!-- RADIO BUTTON -->
<label>Gender</label>
<input type="radio" name="Gender" value="M"> Male
<input type="radio" name="Gender" value="F"> Female

<!-- CHECKBOX -->
<label>Education</label>
<input type="checkbox" name="Education" value="HS"> HS
<input type="checkbox" name="Education" value="AS"> AS
<input type="checkbox" name="Education" value="BS"> BS

<!-- TEXTAREA -->
<label for="Comments">* Comments</label>
<textarea name="Comments" id="Comments" rows="5" required placeholder="Enter your message here"></textarea>

<!-- BUTTONS -->
<div class="buttons">
<input type="reset" value="Reset">
<input type="submit" value="Submit">
</div>

</form>

</main>
